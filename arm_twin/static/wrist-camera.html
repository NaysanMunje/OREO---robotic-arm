<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wrist camera · Arm</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0a0c10;
      color: #e8eaed;
      font-family: system-ui, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow-y: auto;
    }
    header {
      padding: .75rem 1rem;
      background: #12151c;
      border-bottom: 1px solid #2a3140;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; margin: 0 0 .2rem; }
    header p { margin: 0; font-size: .78rem; color: #8b93a7; line-height: 1.35; }
    #preview-wrap {
      flex: 1 1 auto;
      position: relative;
      background: #000;
      min-height: 10rem;
      max-height: 52dvh;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    video.off { display: none; }
    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: .9rem;
      line-height: 1.45;
    }
    #placeholder[hidden] { display: none; }
    .panel {
      padding: .85rem 1rem 1.25rem;
      padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      background: #12151c;
      border-top: 1px solid #2a3140;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      z-index: 6;
    }
    .status {
      font-size: .82rem;
      color: #7eb8ff;
      min-height: 2.5rem;
      line-height: 1.35;
      margin-bottom: .65rem;
    }
    .status.err { color: #f87171; }
    .status.ok { color: #6ee7a0; }
    .status.warn { color: #fbbf24; }
    #secureWarn {
      margin: 0;
      padding: .65rem 1rem;
      background: #451a1a;
      color: #fca5a5;
      font-size: .78rem;
      line-height: 1.4;
      border-bottom: 1px solid #7f1d1d;
    }
    #secureWarn[hidden] { display: none; }
    #stats { font-size: .72rem; color: #6b7280; margin-top: .35rem; }
    button {
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      color: #fff;
      margin-bottom: .45rem;
    }
    button:disabled { opacity: .45; }
    .btn-start { background: #15803d; }
    .btn-stop { background: #7f1d1d; }
    .btn-dim { background: #374151; font-size: .88rem; padding: .65rem; }
    .track-group {
      margin: .65rem 0 .25rem;
      padding: .55rem .65rem;
      border: 1px solid #2a3140;
      border-radius: 8px;
      background: #0f1218;
    }
    .track-group legend {
      font-size: .72rem;
      font-weight: 700;
      color: #7eb8ff;
      padding: 0 .25rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .chk {
      display: flex;
      align-items: center;
      gap: .55rem;
      font-size: .82rem;
      color: #b8c0d4;
      margin: .45rem 0 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .chk input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      margin: 0;
      flex-shrink: 0;
      accent-color: #3b82f6;
      cursor: pointer;
    }
    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      margin-right: 4px;
    }
    .live-dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    body.dim-mode #preview-wrap,
    body.dim-mode header,
    body.dim-mode .chk-cam,
    body.dim-mode .chk-dim,
    body.dim-mode .btn-dim { display: none; }
    body.dim-mode .panel { padding: .5rem; }
    body.dim-mode .status { min-height: auto; margin: 0; font-size: .75rem; }
    #dimBadge {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      padding: .35rem .55rem;
      border-radius: 6px;
      background: rgba(0,0,0,.65);
      font-size: .72rem;
      color: #6ee7a0;
      z-index: 5;
    }
    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    body.dim-mode #dimBadge { display: block; }
  </style>
</head>
<body>
  <div id="secureWarn" hidden></div>
  <header>
    <h1>Wrist camera</h1>
    <p>Mount phone on the wrist. Stream goes to the PC twin while you drive the arm.</p>
  </header>
  <div id="preview-wrap">
    <video id="video" class="off" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>
    <div id="placeholder">Tap <strong>Start camera</strong> below. Allow camera access when asked.</div>
  </div>
  <div id="dimBadge"><span class="live-dot on"></span> Streaming</div>
  <div class="panel">
    <div class="status" id="status"><span class="live-dot" id="liveDot"></span>Not connected</div>
    <button type="button" class="btn-start" id="startBtn">Start camera &amp; stream</button>
    <button type="button" class="btn-stop" id="stopBtn" disabled>Stop</button>
    <fieldset class="track-group">
      <legend>Tracking (sent to PC)</legend>
      <label class="chk"><input type="checkbox" id="trackHand" checked> Track hands</label>
      <label class="chk"><input type="checkbox" id="trackThumb"> Track thumb <span style="color:#6b7280;font-size:.75rem">(knuckles drive shoulder + elbow)</span></label>
      <label class="chk"><input type="checkbox" id="trackFace"> Track face <span style="color:#6b7280;font-size:.75rem">(front camera)</span></label>
    </fieldset>
    <div id="stats"></div>
    <label class="chk chk-cam"><input type="checkbox" id="rearCam" checked> Use rear camera (point away from screen)</label>
    <label class="chk chk-dim"><input type="checkbox" id="dimScreen"> Dim screen while mounted (saves battery)</label>
    <button type="button" class="btn-dim" id="wakeBtn" hidden>Show controls</button>
  </div>
  <canvas id="capture" hidden></canvas>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const capture = document.getElementById('capture');
    const statusEl = document.getElementById('status');
    const placeholder = document.getElementById('placeholder');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const rearCam = document.getElementById('rearCam');
    const trackHand = document.getElementById('trackHand');
    const trackFace = document.getElementById('trackFace');
    const trackThumb = document.getElementById('trackThumb');
    const dimScreen = document.getElementById('dimScreen');
    const wakeBtn = document.getElementById('wakeBtn');
    const secureWarn = document.getElementById('secureWarn');
    const statsEl = document.getElementById('stats');
    const overlayCtx = overlay.getContext('2d');

    let stream = null;
    let ws = null;
    let sendTimer = null;
    let trackRaf = null;
    let wakeLock = null;
    let handLandmarker = null;
    let faceLandmarker = null;
    let visionApi = null;
    let framesSent = 0;
    let uploadErrors = 0;
    let trackFrames = 0;
    let streaming = false;
    let lastVideoTime = -1;
    let lastHandState = { detected: false, hand_count: 0, hands: [] };
    let lastFaceState = { detected: false, face_count: 0, faces: [] };
    let lastPoseState = { detected: false, side: null, shoulder_angle: null, elbow_angle: null, points: null };
    const FPS = 8;
    const JPEG_QUALITY = 0.65;
    const MAX_WIDTH = 640;

    const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const isSecure = window.isSecureContext || isLocalhost;

    if (!isSecure) {
      secureWarn.hidden = false;
      secureWarn.innerHTML = '<strong>Camera may be blocked</strong> — iPhone/Safari needs <strong>HTTPS</strong> for camera on WiFi. '
        + 'Try <strong>Chrome on Android</strong> first, or ask to enable HTTPS on the PC server.';
    } else if (!navigator.mediaDevices?.getUserMedia) {
      secureWarn.hidden = false;
      secureWarn.textContent = 'Camera API not available in this browser.';
    }

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws/wrist-camera`;
    }

    function setStatus(msg, kind = '') {
      statusEl.classList.remove('err', 'ok', 'warn');
      if (kind) statusEl.classList.add(kind);
      const on = kind === 'ok';
      statusEl.innerHTML = `<span class="live-dot${on ? ' on' : ''}"></span>${msg}`;
    }

    function updateStats() {
      if (!statsEl) return;
      if (!streaming) {
        statsEl.textContent = '';
        return;
      }
      const handPart = trackHand.checked
        ? ` · hands: ${lastHandState.detected ? lastHandState.hand_count : '—'}`
        : '';
      const facePart = trackFace.checked
        ? ` · face: ${lastFaceState.detected ? 'yes' : '—'}`
        : '';
      const posePart = trackThumb.checked
        ? ` · thumb: ${lastPoseState.detected ? `sh ${Math.round(lastPoseState.shoulder_angle)}° / el ${Math.round(lastPoseState.elbow_angle)}°` : '—'}`
        : '';
      statsEl.textContent = `Frames sent: ${framesSent}${handPart}${facePart}${posePart}${uploadErrors ? ` · upload errors: ${uploadErrors}` : ''}`;
    }

    function resizeOverlay() {
      const wrap = document.getElementById('preview-wrap');
      overlay.width = wrap.clientWidth;
      overlay.height = wrap.clientHeight;
    }

    async function sendHandState(state) {
      const payload = { type: 'hand', ...state };
      try {
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(payload));
        } else {
          await fetch('/api/wrist-camera/hand', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(state),
          });
        }
      } catch (_) { /* ok */ }
    }

    async function sendFaceState(state) {
      const payload = { type: 'face', ...state };
      try {
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(payload));
        } else {
          await fetch('/api/wrist-camera/face', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(state),
          });
        }
      } catch (_) { /* ok */ }
    }

    async function sendPoseState(state) {
      const payload = { type: 'pose', ...state };
      try {
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(payload));
        } else {
          await fetch('/api/wrist-camera/pose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(state),
          });
        }
      } catch (_) { /* ok */ }
    }

    function trackingActive() {
      return ((trackHand.checked || trackThumb.checked) && handLandmarker)
        || (trackFace.checked && faceLandmarker);
    }

    function stopTrackLoop() {
      if (trackRaf) {
        cancelAnimationFrame(trackRaf);
        trackRaf = null;
      }
      lastVideoTime = -1;
      overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
    }

    function startTrackLoop() {
      stopTrackLoop();
      if (!trackingActive()) return;
      const loop = () => {
        trackRaf = requestAnimationFrame(loop);
        if (!streaming || !trackingActive() || video.readyState < 2) return;
        if (video.currentTime === lastVideoTime) return;
        lastVideoTime = video.currentTime;
        try {
          const ts = performance.now();
          let handResult = null;
          if ((trackHand.checked || trackThumb.checked) && handLandmarker) {
            handResult = handLandmarker.detectForVideo(video, ts);
          }
          lastHandState = (trackHand.checked && handResult)
            ? visionApi.packHandResult(handResult)
            : { detected: false, hand_count: 0, hands: [] };
          lastPoseState = (trackThumb.checked && handResult)
            ? visionApi.packThumbResult(handResult)
            : { detected: false, side: null, shoulder_angle: null, elbow_angle: null, points: null };
          if (trackFace.checked && faceLandmarker) {
            lastFaceState = visionApi.packFaceResult(faceLandmarker.detectForVideo(video, ts));
          } else {
            lastFaceState = { detected: false, face_count: 0, faces: [] };
          }
          resizeOverlay();
          visionApi.drawTracksOnCanvas(
            overlayCtx, lastHandState, lastFaceState, overlay.width, overlay.height, lastPoseState,
          );
          trackFrames += 1;
          if (trackFrames % 3 === 0) {
            if (trackHand.checked) sendHandState(lastHandState);
            if (trackFace.checked) sendFaceState(lastFaceState);
          }
          if (trackThumb.checked && trackFrames % 2 === 0) sendPoseState(lastPoseState);
          if (trackFrames % 15 === 0) updateStats();
        } catch (_) { /* ok */ }
      };
      trackRaf = requestAnimationFrame(loop);
    }

    async function ensureVisionModels() {
      try {
        if (!visionApi) visionApi = await import('/static/hand-track.js');
        if ((trackHand.checked || trackThumb.checked) && !handLandmarker) {
          setStatus('Loading hand/thumb tracking model…', 'warn');
          handLandmarker = await visionApi.createHandLandmarker();
        }
        if (trackFace.checked && !faceLandmarker) {
          setStatus('Loading face tracking model…', 'warn');
          faceLandmarker = await visionApi.createFaceLandmarker();
        }
      } catch (e) {
        if (trackHand.checked || trackThumb.checked) {
          trackHand.checked = false;
          trackThumb.checked = false;
          handLandmarker = null;
        }
        if (trackFace.checked) {
          trackFace.checked = false;
          faceLandmarker = null;
        }
        throw e;
      }
    }

    function onTrackToggle() {
      if (streaming && (trackHand.checked || trackFace.checked || trackThumb.checked)) {
        ensureVisionModels()
          .then(() => startTrackLoop())
          .catch((e) => setStatus(`Tracking failed: ${e.message || e}`, 'err'));
      } else {
        stopTrackLoop();
        if (!trackHand.checked) sendHandState({ detected: false, hand_count: 0, hands: [] });
        if (!trackFace.checked) sendFaceState({ detected: false, face_count: 0, faces: [] });
        if (!trackThumb.checked) {
          sendPoseState({ detected: false, side: null, shoulder_angle: null, elbow_angle: null, points: null });
        }
      }
      updateStats();
    }

    trackHand.addEventListener('change', onTrackToggle);
    trackThumb.addEventListener('change', onTrackToggle);
    trackFace.addEventListener('change', () => {
      if (trackFace.checked) rearCam.checked = false;
      onTrackToggle();
    });
    rearCam.addEventListener('change', () => {
      if (rearCam.checked && trackFace.checked) trackFace.checked = false;
    });

    window.addEventListener('resize', resizeOverlay);

    function cameraErrorMessage(err) {
      const n = err?.name || '';
      if (n === 'NotAllowedError' || n === 'PermissionDeniedError') {
        return 'Camera permission denied — tap Allow, or check browser site settings → Camera.';
      }
      if (n === 'NotFoundError' || n === 'DevicesNotFoundError') {
        return 'No camera found on this device.';
      }
      if (n === 'NotReadableError' || n === 'TrackStartError') {
        return 'Camera is in use by another app — close it and try again.';
      }
      if (n === 'SecurityError' || !isSecure) {
        return 'Camera blocked on HTTP (common on iPhone). Use Android Chrome or HTTPS.';
      }
      return err?.message || String(err);
    }

    function applyDimMode() {
      const dim = dimScreen.checked && stream;
      document.body.classList.toggle('dim-mode', dim);
      wakeBtn.hidden = !dim;
    }

    dimScreen.addEventListener('change', applyDimMode);
    wakeBtn.addEventListener('click', () => {
      document.body.classList.remove('dim-mode');
      wakeBtn.hidden = true;
    });

    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
      } catch (_) { /* ok */ }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) { await wakeLock.release(); wakeLock = null; }
      } catch (_) { /* ok */ }
    }

    async function openCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Camera API not available in this browser.');
      }
      const preferRear = rearCam.checked;
      const attempts = [
        { audio: false, video: { facingMode: preferRear ? { ideal: 'environment' } : 'user', width: { ideal: 1280 }, height: { ideal: 720 } } },
        { audio: false, video: { facingMode: preferRear ? 'environment' : 'user' } },
        { audio: false, video: true },
      ];
      let lastErr;
      for (const constraints of attempts) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error('Could not open camera');
    }

    function connectWs() {
      return new Promise((resolve) => {
        try {
          ws = new WebSocket(wsUrl());
          ws.binaryType = 'arraybuffer';
          const t = setTimeout(() => resolve(false), 5000);
          ws.onopen = () => ws.send(JSON.stringify({ role: 'publish' }));
          ws.onmessage = (ev) => {
            if (typeof ev.data !== 'string') return;
            clearTimeout(t);
            try {
              const msg = JSON.parse(ev.data);
              if (msg.type === 'ready') resolve(true);
              if (msg.type === 'error') resolve(false);
            } catch (_) { resolve(false); }
          };
          ws.onerror = () => { clearTimeout(t); resolve(false); };
          ws.onclose = () => {
            if (sendTimer) { clearInterval(sendTimer); sendTimer = null; }
          };
        } catch (_) {
          resolve(false);
        }
      });
    }

    async function uploadFrame(blob) {
      const res = await fetch('/api/wrist-camera/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'image/jpeg' },
        body: blob,
      });
      if (!res.ok) throw new Error(`Upload ${res.status}`);
    }

    function startSending(useWs) {
      const ctx = capture.getContext('2d');
      sendTimer = setInterval(() => {
        if (!streaming || !stream || video.readyState < 2) return;
        let w = video.videoWidth;
        let h = video.videoHeight;
        if (!w || !h) return;
        if (w > MAX_WIDTH) {
          h = Math.round(h * (MAX_WIDTH / w));
          w = MAX_WIDTH;
        }
        capture.width = w;
        capture.height = h;
        ctx.drawImage(video, 0, 0, w, h);
        capture.toBlob(async (blob) => {
          if (!blob || !streaming) return;
          try {
            if (useWs && ws?.readyState === WebSocket.OPEN) {
              const buf = await blob.arrayBuffer();
              ws.send(buf);
            } else {
              await uploadFrame(blob);
            }
            framesSent += 1;
            if (framesSent % 8 === 0) updateStats();
          } catch (_) {
            uploadErrors += 1;
            updateStats();
          }
        }, 'image/jpeg', JPEG_QUALITY);
      }, 1000 / FPS);
    }

    async function start() {
      startBtn.disabled = true;
      framesSent = 0;
      uploadErrors = 0;
      setStatus('Requesting camera…');
      try {
        stream = await openCamera();
        video.srcObject = stream;
        video.classList.remove('off');
        placeholder.hidden = true;
        video.setAttribute('playsinline', '');
        video.muted = true;
        await video.play();

        if (!video.videoWidth) {
          await new Promise((r) => { video.onloadedmetadata = r; setTimeout(r, 1500); });
        }
        if (!video.videoWidth) {
          throw new Error('Camera opened but no video — check permission or try another browser.');
        }

        resizeOverlay();
        if (trackHand.checked || trackFace.checked || trackThumb.checked) await ensureVisionModels();

        setStatus('Camera OK — connecting to PC…', 'warn');
        const wsOk = await connectWs();
        streaming = true;
        startSending(wsOk);
        startTrackLoop();
        await requestWakeLock();
        applyDimMode();
        updateStats();

        const trackParts = [];
        if (trackHand.checked && handLandmarker) trackParts.push('hands');
        if (trackThumb.checked && handLandmarker) trackParts.push('thumb');
        if (trackFace.checked && faceLandmarker) trackParts.push('face');
        const trackNote = trackParts.length ? ` · ${trackParts.join(' + ')} tracking on` : '';
        setStatus(
          (wsOk ? 'Streaming to PC (WebSocket)' : 'Streaming to PC (HTTP upload)') + trackNote,
          'ok',
        );
        stopBtn.disabled = false;
      } catch (e) {
        setStatus(cameraErrorMessage(e), 'err');
        startBtn.disabled = false;
        stopAll();
      }
    }

    function stopAll() {
      streaming = false;
      stopTrackLoop();
      lastHandState = { detected: false, hand_count: 0, hands: [] };
      lastFaceState = { detected: false, face_count: 0, faces: [] };
      lastPoseState = { detected: false, side: null, shoulder_angle: null, elbow_angle: null, points: null };
      sendHandState(lastHandState);
      sendFaceState(lastFaceState);
      sendPoseState(lastPoseState);
      if (sendTimer) { clearInterval(sendTimer); sendTimer = null; }
      if (ws) { ws.close(); ws = null; }
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
      video.srcObject = null;
      video.classList.add('off');
      placeholder.hidden = false;
      document.body.classList.remove('dim-mode');
      wakeBtn.hidden = true;
      releaseWakeLock();
      setStatus('Stopped');
      startBtn.disabled = false;
      stopBtn.disabled = true;
      updateStats();
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stopAll);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && stream) requestWakeLock();
    });
  </script>
</body>
</html>
